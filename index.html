<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI管培生 · 候选人评估系统</title>
<style>
  :root {
    --bg-000: #ffffff;
    --bg-100: #f8f8f6;
    --bg-200: #f4f4f1;
    --bg-300: #efeeed;
    --bg-400: #e6e5e0;
    --text-100: #121212;
    --text-200: #373734;
    --text-400: #7b7974;
    --accent-brand: #d97757;
    --accent-link: #2977d6;
    --danger: #c0392b;
    --warning: #a86b00;
    --success: #3d7400;
    --border-light: rgba(18,18,18,0.08);
    --border-medium: rgba(18,18,18,0.12);
    --border-strong: rgba(18,18,18,0.18);
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    --radius-sm: 6px;
    --radius-md: 12px;
    --radius-lg: 20px;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
    --font-mono: ui-monospace, "SF Mono", Menlo, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: var(--font-sans);
    background: var(--bg-100);
    color: var(--text-200);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    font-size: 15px;
  }
  .app { display: flex; height: 100vh; overflow: hidden; }

  /* ============ 侧栏 ============ */
  .sidebar {
    width: 260px; min-width: 260px;
    background: var(--bg-300);
    border-right: 1px solid var(--border-light);
    display: flex; flex-direction: column;
  }
  .sidebar-header { padding: 22px 20px 14px; }
  .sidebar-header h1 { font-size: 17px; font-weight: 600; color: var(--text-100); letter-spacing: -0.01em; }
  .sidebar-header p { font-size: 12px; color: var(--text-400); margin-top: 2px; }
	  .add-row { display: flex; gap: 8px; padding: 0 16px 14px; }
	  .add-row-single .btn { width: 100%; justify-content: center; padding: 8px 14px; }
	  .add-row-stack { flex-direction: column; }
	  .add-row-stack .btn { width: 100%; justify-content: center; padding: 8px 14px; }
	  .add-row input {
	    flex: 1; min-width: 0; padding: 8px 12px; font-size: 14px;
	    border: 1px solid var(--border-medium); border-radius: var(--radius-sm);
	    background: var(--bg-000); color: var(--text-100); font-family: var(--font-sans);
	  }
	  .add-row input:focus { outline: none; border-color: var(--border-strong); }
	  .sidebar-tip { padding: 0 18px 12px; margin-top: -6px; font-size: 11.5px; line-height: 1.5; color: var(--text-400); }
  .cand-list { flex: 1; overflow-y: auto; padding: 4px 10px 20px; }
  .cand-item {
    padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    margin-bottom: 2px;
  }
	  .cand-item:hover { background: var(--bg-400); }
	  .cand-item.active { background: var(--bg-000); box-shadow: var(--shadow-sm); }
	  .cand-item .name { font-size: 14px; color: var(--text-100); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
	  .cand-item .name small { font-size: 11.5px; color: var(--text-400); font-weight: 400; }
	  .cand-item .school { font-size: 11.5px; color: var(--text-400); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: -2px; }
	  .cand-item .cand-text { min-width: 0; display: flex; flex-direction: column; }
  .cand-item .stage-dots { display: flex; gap: 4px; flex-shrink: 0; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--bg-400); border: 1px solid var(--border-medium); }
  .dot.done { background: var(--success); border-color: var(--success); }
  .dot.flag { background: var(--warning); border-color: var(--warning); }
  .dot.bad  { background: var(--danger); border-color: var(--danger); }
  .cand-item .del { visibility: hidden; color: var(--text-400); font-size: 15px; background: none; border: none; cursor: pointer; padding: 0 2px; line-height: 1; }
  .cand-item:hover .del { visibility: visible; }
  .cand-item .del:hover { color: var(--danger); }
  .user-note {
    padding: 9px 16px 0; font-size: 12px; color: var(--text-400);
    border-top: 1px solid var(--border-light);
  }
  .user-note b { color: var(--text-100); font-weight: 500; }
  .admin-link {
    width: calc(100% - 32px); margin: 8px 16px 0; padding: 7px 10px;
    border: 1px solid var(--border-medium); border-radius: var(--radius-sm);
    background: var(--bg-000); color: var(--text-100); font-size: 12.5px;
    font-family: var(--font-sans); cursor: pointer;
  }
  .admin-link:hover { border-color: var(--border-strong); }
  .logout-btn {
    width: calc(100% - 32px); margin: 8px 16px 14px; padding: 7px 10px;
    border: 1px solid var(--border-medium); border-radius: var(--radius-sm);
    background: transparent; color: var(--text-400); font-size: 12.5px;
    font-family: var(--font-sans); cursor: pointer;
  }
  .logout-btn:hover { color: var(--danger); border-color: rgba(192,57,43,0.35); background: rgba(192,57,43,0.04); }

  /* ============ 主区域 ============ */
  .main { flex: 1; overflow-y: auto; }
  .main-inner { max-width: 860px; margin: 0 auto; padding: 36px 40px 100px; }
  .empty-state { text-align: center; padding: 120px 40px; }
  .empty-state h2 { font-size: clamp(26px, 4vw, 38px); font-weight: 300; color: var(--text-100); letter-spacing: -0.02em; }
  .empty-state p { color: var(--text-400); max-width: 480px; margin: 14px auto 0; font-size: 15px; }

  .cand-header { margin-bottom: 26px; }
  .cand-header h2 { font-size: 30px; font-weight: 300; color: var(--text-100); letter-spacing: -0.02em; }
  .cand-header .meta { font-size: 13px; color: var(--text-400); margin-top: 4px; }

  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border-medium); margin-bottom: 28px; flex-wrap: wrap; }
  .tab {
    padding: 9px 16px; font-size: 14px; color: var(--text-400); cursor: pointer;
    border: none; background: none; font-family: var(--font-sans);
    border-bottom: 2px solid transparent; margin-bottom: -1px; display: flex; align-items: center; gap: 6px;
  }
  .tab:hover { color: var(--text-100); }
  .tab.active { color: var(--text-100); font-weight: 600; border-bottom-color: var(--accent-brand); }
  .tab .tick { font-size: 11px; color: var(--success); }

  .card {
    background: var(--bg-000); border: 1px solid var(--border-light);
    border-radius: var(--radius-md); padding: 26px 28px; margin-bottom: 18px;
  }
  .card h3 { font-size: 17px; font-weight: 600; color: var(--text-100); margin-bottom: 6px; }
  .card .hint { font-size: 13px; color: var(--text-400); margin-bottom: 14px; }
  textarea {
    width: 100%; min-height: 200px; padding: 14px 16px; font-size: 14px; line-height: 1.7;
    border: 1px solid var(--border-medium); border-radius: var(--radius-sm);
    background: var(--bg-000); color: var(--text-100); font-family: var(--font-sans); resize: vertical;
  }
  textarea:focus { outline: none; border-color: var(--border-strong); box-shadow: var(--shadow-sm); }
  textarea.short { min-height: 90px; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 20px; font-size: 14px; font-weight: 500; font-family: var(--font-sans);
    border-radius: var(--radius-sm); cursor: pointer; border: 1px solid transparent;
  }
  .btn-primary { background: var(--text-100); color: #fff; }
  .btn-primary:hover { background: #2c2c2a; }
  .btn-secondary { background: var(--bg-000); color: var(--text-100); border-color: var(--border-medium); }
  .btn-secondary:hover { border-color: var(--border-strong); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-row { display: flex; gap: 10px; margin-top: 14px; align-items: center; flex-wrap: wrap; }
  .spinner {
    width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff;
    border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block;
  }
  .btn-secondary .spinner { border-color: rgba(18,18,18,0.2); border-top-color: var(--text-100); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box {
    background: rgba(192,57,43,0.06); border: 1px solid rgba(192,57,43,0.25);
    color: var(--danger); padding: 12px 16px; border-radius: var(--radius-sm); font-size: 13px; margin-top: 14px;
    white-space: pre-wrap;
  }

  /* ============ 结果展示 ============ */
  .tag { display: inline-block; padding: 3px 12px; border-radius: 100px; font-size: 12.5px; font-weight: 600; letter-spacing: 0.02em; }
  .tag-good { background: rgba(61,116,0,0.1); color: var(--success); }
  .tag-mid  { background: rgba(168,107,0,0.1); color: var(--warning); }
  .tag-bad  { background: rgba(192,57,43,0.08); color: var(--danger); }
  .tag-neutral { background: var(--bg-200); color: var(--text-400); }

  .result-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .result-header h4 { font-size: 15px; font-weight: 600; color: var(--text-100); }
  .result-summary { font-size: 14.5px; color: var(--text-200); margin-bottom: 20px; padding: 14px 16px; background: var(--bg-200); border-radius: var(--radius-sm); }

  .dim-row { padding: 14px 0; border-bottom: 1px solid var(--border-light); }
  .dim-row:last-child { border-bottom: none; }
  .dim-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .dim-name { font-size: 14.5px; font-weight: 600; color: var(--text-100); }
  .score-wrap { display: flex; align-items: center; gap: 10px; }
  .score-num { font-size: 20px; font-weight: 300; color: var(--text-100); min-width: 42px; text-align: right; }
  .score-num small { font-size: 12px; color: var(--text-400); font-weight: 400; }
  .score-bar { width: 110px; height: 5px; background: var(--bg-300); border-radius: 3px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 3px; background: var(--accent-brand); }
  .evidence { margin-top: 8px; }
  .evidence li { font-size: 13.5px; color: var(--text-200); margin-left: 18px; margin-bottom: 3px; }
  .evidence li.concern { color: var(--warning); }
  .evidence li.neg { color: var(--danger); }
  .evidence li.pos { color: var(--success); }

  .material-overview { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin: 16px 0 8px; }
  .dim-tile {
    border: 1px solid var(--border-light); border-radius: var(--radius-sm);
    background: var(--bg-000); overflow: hidden;
  }
  .dim-tile summary {
    list-style: none; cursor: pointer; padding: 12px 13px;
    display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center;
  }
  .dim-tile summary::-webkit-details-marker { display: none; }
  .dim-tile summary::after {
    content: '展开'; grid-column: 1 / -1; font-size: 11.5px; color: var(--text-400);
  }
  .dim-tile[open] summary::after { content: '收起'; }
  .dim-tile-name { min-width: 0; font-size: 13.5px; font-weight: 600; color: var(--text-100); line-height: 1.35; }
  .dim-tile-score { font-size: 22px; font-weight: 300; color: var(--text-100); white-space: nowrap; }
  .dim-tile-score small { font-size: 11px; color: var(--text-400); }
  .dim-tile-bar { grid-column: 1 / -1; height: 4px; border-radius: 3px; background: var(--bg-300); overflow: hidden; }
  .dim-tile-fill { display: block; height: 100%; background: var(--accent-brand); border-radius: 3px; }
  .dim-tile-body { padding: 0 13px 12px; border-top: 1px solid var(--border-light); }
  .dim-tile-body ul { margin-top: 9px; }
  .dim-tile-body li { font-size: 12.8px; line-height: 1.5; color: var(--text-200); margin-left: 17px; margin-bottom: 4px; }
  .dim-tile-body li.concern { color: var(--warning); }
  .gate-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 8px; margin: 14px 0 4px; }
  .gate-chip {
    border: 1px solid var(--border-light); border-radius: var(--radius-sm);
    padding: 10px 12px; background: var(--bg-000);
  }
  .gate-chip .gate-top { display: flex; justify-content: space-between; gap: 8px; align-items: center; }
  .gate-chip .gate-name { font-size: 13px; font-weight: 600; color: var(--text-100); }
  .gate-chip .gate-note { font-size: 12.2px; line-height: 1.45; color: var(--text-400); margin-top: 5px; }
  .gate-pass { border-color: rgba(61,116,0,0.25); background: rgba(61,116,0,0.04); }
  .gate-risk { border-color: rgba(168,107,0,0.25); background: rgba(168,107,0,0.04); }
  .gate-fail { border-color: rgba(192,57,43,0.28); background: rgba(192,57,43,0.04); }
  .fold-block { border-top: 1px solid var(--border-light); margin-top: 16px; padding-top: 12px; }
  .fold-block summary { cursor: pointer; font-size: 13.5px; font-weight: 600; color: var(--text-100); }
  .fold-block .section-label { margin-top: 12px; }
  .quiet-edit {
    border: 1px dashed var(--border-medium); border-radius: var(--radius-sm);
    background: var(--bg-100); margin-bottom: 18px;
  }
  .quiet-edit summary { cursor: pointer; padding: 12px 14px; font-size: 13px; color: var(--text-400); }
  .quiet-edit .card { border: none; border-top: 1px solid var(--border-light); border-radius: 0; margin-bottom: 0; background: transparent; }

  .profile-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 18px; }
  .profile-item { border: 1px solid var(--border-light); border-radius: var(--radius-sm); padding: 12px 14px; background: var(--bg-000); }
  .profile-item .label { font-size: 11.5px; color: var(--text-400); margin-bottom: 4px; }
  .profile-item .value { font-size: 15px; color: var(--text-100); font-weight: 600; }
  .stage-board { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-top: 12px; }
  .stage-card { border: 1px solid var(--border-light); border-radius: var(--radius-sm); padding: 13px 14px; background: var(--bg-000); }
  .stage-card .stage-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 8px; }
  .stage-card .stage-title { font-size: 13.5px; font-weight: 600; color: var(--text-100); }
  .stage-card .stage-summary { font-size: 12.8px; line-height: 1.5; color: var(--text-400); }
  .next-step { display: flex; justify-content: space-between; align-items: center; gap: 14px; padding: 14px 16px; background: var(--bg-200); border-radius: var(--radius-sm); margin-bottom: 18px; }
  .next-step .k { font-size: 12px; color: var(--text-400); }
  .next-step .v { font-size: 17px; font-weight: 600; color: var(--text-100); }

  .section-label { font-size: 11.5px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-400); margin: 22px 0 10px; }
  .q-list li { font-size: 14px; color: var(--text-200); margin-left: 18px; margin-bottom: 8px; }
  .q-list li .purpose { display: block; font-size: 12.5px; color: var(--text-400); }
  .flag-list li { font-size: 13.5px; margin-left: 18px; margin-bottom: 5px; }

  .upload-zone {
    border: 1.5px dashed var(--border-medium); border-radius: var(--radius-sm);
    padding: 22px 16px; text-align: center; cursor: pointer; background: var(--bg-100);
  }
  .upload-zone:hover { border-color: var(--accent-brand); background: var(--bg-200); }
  .file-chip {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    background: var(--bg-200); border: 1px solid var(--border-light); border-radius: var(--radius-sm);
    padding: 8px 12px; margin-top: 8px; font-size: 13.5px; color: var(--text-100);
  }
  .file-chip small { color: var(--text-400); margin-left: 6px; }
  .file-chip button { background: none; border: none; cursor: pointer; color: var(--text-400); font-size: 16px; line-height: 1; padding: 0 2px; }
  .file-chip button:hover { color: var(--danger); }

  .check-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; font-size: 14px; color: var(--text-200); }
  .check-row input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--accent-brand); }
  .wc-display { font-size: 13px; color: var(--text-400); }
  .wc-display b { color: var(--text-100); font-weight: 600; }
  .wc-display .ok { color: var(--success); } .wc-display .no { color: var(--danger); }

  .edu-verdict { border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 18px; border: 1px solid var(--border-medium); }
  .edu-pass { background: rgba(61,116,0,0.06); border-color: rgba(61,116,0,0.3); }
  .edu-fail { background: rgba(192,57,43,0.06); border-color: rgba(192,57,43,0.35); }
  .edu-unk  { background: rgba(168,107,0,0.06); border-color: rgba(168,107,0,0.3); }
  .edu-head { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 600; color: var(--text-100); }
  .edu-mark { font-size: 18px; font-weight: 700; }
  .edu-pass .edu-mark { color: var(--success); }
  .edu-fail .edu-mark { color: var(--danger); }
  .edu-unk .edu-mark { color: var(--warning); }
  .edu-list { margin: 10px 0 6px; }
  .edu-list li { font-size: 13.5px; color: var(--text-200); margin-left: 18px; margin-bottom: 3px; }
  .edu-note { font-size: 12px; color: var(--text-400); margin-top: 6px; }
  .hard-req { display: flex; align-items: baseline; gap: 10px; padding: 7px 0; font-size: 14px; border-bottom: 1px solid var(--border-light); }
  .hard-req:last-child { border-bottom: none; }
  .hr-mark { font-weight: 700; min-width: 18px; }
  .hr-mark.pass { color: var(--success); } .hr-mark.fail { color: var(--danger); } .hr-mark.unk { color: var(--warning); }
  .account-form { display: grid; grid-template-columns: minmax(160px, 1fr) minmax(160px, 1fr) auto; gap: 10px; align-items: center; }
  .account-form input {
    min-width: 0; padding: 9px 12px; font-size: 14px;
    border: 1px solid var(--border-medium); border-radius: var(--radius-sm);
    background: var(--bg-000); color: var(--text-100); font-family: var(--font-sans);
  }
  .account-form input:focus { outline: none; border-color: var(--border-strong); }
  .account-row {
    display: grid; grid-template-columns: 1fr auto auto; gap: 12px; align-items: center;
    padding: 12px 0; border-bottom: 1px solid var(--border-light);
  }
  .account-row:last-child { border-bottom: none; }
  .account-name { min-width: 0; color: var(--text-100); font-weight: 600; }
  .account-meta { color: var(--text-400); font-size: 12px; margin-top: 1px; }
  .danger-btn {
    border: 1px solid rgba(192,57,43,0.25); color: var(--danger); background: rgba(192,57,43,0.03);
    border-radius: var(--radius-sm); padding: 6px 10px; cursor: pointer; font-family: var(--font-sans);
  }
  .danger-btn:hover { background: rgba(192,57,43,0.08); }

  .final-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 8px; }
  .final-stat { background: var(--bg-200); border-radius: var(--radius-sm); padding: 14px 16px; }
  .final-stat .v { font-size: 26px; font-weight: 300; color: var(--text-100); }
  .final-stat .l { font-size: 12px; color: var(--text-400); }
  .stale-note { font-size: 12.5px; color: var(--warning); margin-top: 10px; }

  @media (max-width: 768px) {
    .app { flex-direction: column; }
    .sidebar { width: 100%; min-width: 0; max-height: 40vh; }
    .main-inner { padding: 24px 18px 80px; }
    .material-overview { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .account-form { grid-template-columns: 1fr; }
  }

  @media (max-width: 520px) {
    .material-overview { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>候选人评估系统</h1>
      <p>AI产品体验官（实习/管培）</p>
    </div>
    <div class="add-row add-row-single">
      <button class="btn btn-primary" onclick="addCandidate()">新增候选人</button>
    </div>
    <div class="sidebar-tip">进入候选人页后上传简历和项目材料，系统会自动识别姓名。</div>
    <div class="cand-list" id="candList"></div>
    <div class="user-note" id="userNote">当前账号：<b>加载中</b></div>
    <button class="admin-link" id="adminBtn" style="display:none" onclick="openAdmin()">账号管理</button>
    <button class="logout-btn" onclick="logout()">退出登录</button>
  </aside>
  <main class="main"><div class="main-inner" id="mainArea"></div></main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js"></script>
<script>
if (window.pdfjsLib) pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  /* ================================================================
   数据层：优先使用本地 SQLite API，失败时降级到 window.storage/localStorage/内存
================================================================ */
const IDX_KEY = 'screener:index';
const API_BASE = '';
let memStore = {};
let storageMode = 'memory';
let currentUser = '';

async function detectStorageMode() {
  try {
    const resp = await fetch(API_BASE + '/api/health', { cache: 'no-store' });
    if (resp.ok) return 'sqlite';
  } catch(e) {}
  if (window.storage && window.storage.get) return 'window.storage';
  try {
    const k = '__screener_storage_test__';
    localStorage.setItem(k, '1');
    localStorage.removeItem(k);
    return 'localStorage';
  } catch(e) {}
  return 'memory';
}

async function stGet(key) {
  if (storageMode === 'sqlite') {
    try {
      const resp = await fetch(API_BASE + '/api/store/' + encodeURIComponent(key), { cache: 'no-store' });
      if (resp.ok) { const r = await resp.json(); return r.value || null; }
    } catch(e) {}
  }
  if (storageMode === 'window.storage') { try { const r = await window.storage.get(key, true); return r ? r.value : null; } catch(e) { return null; } }
  if (storageMode === 'localStorage') { try { return localStorage.getItem(key); } catch(e) { return null; } }
  return memStore[key] || null;
}
async function stSet(key, val) {
  if (storageMode === 'sqlite') {
    const resp = await fetch(API_BASE + '/api/store/' + encodeURIComponent(key), {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ value: val })
    });
    if (!resp.ok) {
      const t = await resp.text();
      throw new Error('SQLite保存失败：' + t.slice(0, 200));
    }
    return;
  }
  if (storageMode === 'window.storage') { try { await window.storage.set(key, val, true); return; } catch(e) {} }
  if (storageMode === 'localStorage') { try { localStorage.setItem(key, val); return; } catch(e) { throw new Error('浏览器本地存储失败：' + e.message); } }
  memStore[key] = val;
}
async function stDel(key) {
  if (storageMode === 'sqlite') {
    await fetch(API_BASE + '/api/store/' + encodeURIComponent(key), { method: 'DELETE' });
    return;
  }
  if (storageMode === 'window.storage') { try { await window.storage.delete(key, true); return; } catch(e) {} }
  if (storageMode === 'localStorage') { try { localStorage.removeItem(key); return; } catch(e) {} }
  delete memStore[key];
}

let index = [];          // [{id, name}]
let current = null;      // 当前候选人完整对象

function pendingCandidateName() {
  const d = new Date();
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  return '待识别候选人 ' + hh + ':' + mm;
}

function isPendingName(name) {
  return !name || /^待识别候选人/.test(String(name));
}

function cleanDetectedName(name) {
  if (!name) return '';
  const n = String(name).replace(/[：:，,。；;\s]+$/g, '').trim();
  if (!n || /无法判断|未知|未提取|无相关信息|候选人/.test(n)) return '';
  if (n.length > 20) return '';
  return n;
}

function cleanDetectedSchool(name) {
  if (!name) return '';
  const s = String(name).replace(/[：:，,。；;\s]+$/g, '').trim();
  if (!s || /无法判断|未知|未提取|无相关信息/.test(s)) return '';
  return s.length > 30 ? s.slice(0, 30) : s;
}

function detectSchool(result) {
  const education = result && Array.isArray(result.education) ? result.education : [];
  const relevant = education.find(e => e && /本科|硕士|博士|研究生/.test(e.level || '') && e.school) ||
    education.find(e => e && e.school);
  return cleanDetectedSchool(relevant && relevant.school);
}

function normalizeGender(v) {
  const s = String(v || '').trim();
  if (/^男/.test(s)) return '男';
  if (/^女/.test(s)) return '女';
  return '';
}

function detectEducationStage(result) {
  const explicit = String(result && (result.educationStage || result.currentEducationStage || '') || '').trim();
  if (/博士|硕士|研究生/.test(explicit)) return '研究生';
  if (/本科|学士/.test(explicit)) return '本科';
  const education = result && Array.isArray(result.education) ? result.education : [];
  return education.some(e => /博士|硕士|研究生/.test((e && e.level) || '')) ? '研究生' :
    (education.some(e => /本科|学士/.test((e && e.level) || '')) ? '本科' : '');
}

function detectGraduationYear(result) {
  const explicit = String(result && (result.graduationYear || result.gradYear || '') || '').match(/20\d{2}/);
  if (explicit) return explicit[0];
  const education = result && Array.isArray(result.education) ? result.education : [];
  const years = [];
  for (const e of education) {
    const matches = String((e && e.period) || '').match(/20\d{2}/g) || [];
    for (const y of matches) years.push(Number(y));
  }
  const futureOrRecent = years.filter(y => y >= 2024 && y <= 2035);
  const pool = futureOrRecent.length ? futureOrRecent : years;
  return pool.length ? String(Math.max(...pool)) : '';
}

async function applyDetectedProfile(result) {
  if (!current || !result) return false;
  const detected = cleanDetectedName(result.candidateName || result.name || (result.basicInfo && result.basicInfo.name));
  const school = detectSchool(result);
  const gender = normalizeGender(result.gender || result.sex || (result.basicInfo && result.basicInfo.gender));
  const educationStage = detectEducationStage(result);
  const graduationYear = detectGraduationYear(result);
  let changed = false;
  if (detected) {
    const canRename = isPendingName(current.name) || current.nameStatus === 'resume-detected';
    if (canRename && current.name !== detected) {
      current.name = detected;
      current.nameStatus = 'resume-detected';
      current.nameUpdatedAt = new Date().toISOString();
      changed = true;
    }
  }
  if (school && current.school !== school) {
    current.school = school;
    current.schoolUpdatedAt = new Date().toISOString();
    changed = true;
  }
  if (gender && current.gender !== gender) {
    current.gender = gender;
    changed = true;
  }
  if (educationStage && current.educationStage !== educationStage) {
    current.educationStage = educationStage;
    changed = true;
  }
  if (graduationYear && current.graduationYear !== graduationYear) {
    current.graduationYear = graduationYear;
    changed = true;
  }
  if (!changed) return false;
  const item = index.find(x => x.id === current.id);
  if (item) {
    item.name = current.name;
    if (current.school) item.school = current.school;
    if (current.gender) item.gender = current.gender;
    if (current.educationStage) item.educationStage = current.educationStage;
    if (current.graduationYear) item.graduationYear = current.graduationYear;
  }
  await saveIndex();
  return true;
}

function newCandidate(name) {
  const displayName = name || pendingCandidateName();
  return {
    id: 'c' + Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    name: displayName,
    nameStatus: name ? 'manual' : 'pending',
    persisted: false,
    createdAt: new Date().toISOString(),
    stages: {
      material:  { result: null, at: null },
      resume:    { input: '', result: null, at: null },
      project:   { input: '', notes: '', result: null, at: null },
      interview: { input: '', outline: null, result: null, at: null },
      trial:     { input: '', checks: { deadline: false, screenshots: false, format: false }, result: null, at: null },
      final:     { result: null, at: null }
    }
  };
}

async function saveIndex() { await stSet(IDX_KEY, JSON.stringify(index)); }
async function saveCurrent() {
  if (!current || current.persisted === false) return;
  await stSet('screener:cand:' + current.id, JSON.stringify(current));
}
async function ensureCurrentPersisted() {
  if (!current || current.persisted !== false) return;
  current.persisted = true;
  if (!index.some(x => x.id === current.id)) {
    index.unshift({
      id: current.id,
      name: current.name,
      school: current.school || '',
      gender: current.gender || '',
      educationStage: current.educationStage || '',
      graduationYear: current.graduationYear || ''
    });
  }
  await saveIndex();
  await saveCurrent();
}
function fileStoreKey(id) { return 'screener:files:' + id; }
async function loadCandidateFiles(id) {
  if (memFiles[id]) return memFiles[id];
  try {
    const raw = await stGet(fileStoreKey(id));
    memFiles[id] = raw ? JSON.parse(raw) : [];
  } catch(e) {
    memFiles[id] = [];
  }
  return memFiles[id];
}
async function saveCandidateFiles(id) {
  if (current && current.id === id && current.persisted === false) return;
  await stSet(fileStoreKey(id), JSON.stringify(filesOf(id)));
}

    index = raw ? JSON.parse(raw) : [];

}

async function addCandidate() {
  adminMode = false;
  const c = newCandidate();
  memFiles[c.id] = [];
  current = c; activeTab = 'resume';
  renderSidebar(); renderMain();
}

async function openCandidate(id) {
  adminMode = false;
  const raw = await stGet('screener:cand:' + id);
  if (!raw) return;
  current = JSON.parse(raw);
  if (!current.stages.material) current.stages.material = { result: null, at: null };
  const item = index.find(x => x.id === current.id);
  if (item) {
    let changed = false;
    ['school','gender','educationStage','graduationYear'].forEach(k => {
      if (current[k] && item[k] !== current[k]) { item[k] = current[k]; changed = true; }
    });
    if (changed) await saveIndex();
  }
  await loadCandidateFiles(id);
  activeTab = hasAnyEvaluation(current.stages) ? 'overview' : 'resume';
  renderSidebar(); renderMain();
}

    showError('adminErr', '请填写账号名和密码。');
    return;
  }
  setLoading('adminSaveBtn', true);
  try {
    const resp = await fetch(API_BASE + '/api/admin/users', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },

async function removeAdminUser(username) {
  clearError('adminErr');
  if (username === '钟志远') {
    showError('adminErr', '管理员账号不能删除。');
    return;
  }
  if (!confirm('确定删除账号「' + username + '」？删除后该账号将无法登录。')) return;
  try {
    const resp = await fetch(API_BASE + '/api/admin/users/' + encodeURIComponent(username), { method: 'DELETE' });
    const data = await resp.json();
    if (!resp.ok || !data.ok) throw new Error(data.error || '删除账号失败');
    adminUsers = data.users || [];
    renderMain();
  } catch(e) {
    showError('adminErr', e.message);
  }
}

async function deleteCandidate(id, ev) {
  ev.stopPropagation();
  if (!confirm('确定删除该候选人及全部评估记录？此操作不可恢复。')) return;
  index = index.filter(x => x.id !== id);
  await saveIndex();
  await stDel('screener:cand:' + id);
  await stDel(fileStoreKey(id));
  delete memFiles[id];
  if (current && current.id === id) current = null;
  renderSidebar(); renderMain();
}

let settings = { engine: 'deepseek' };

async function loadSettings() {
  try { const raw = await stGet('screener:settings'); if (raw) settings = JSON.parse(raw); } catch(e) {}
  const sel = document.getElementById('engineSel');
  if (sel) sel.value = settings.engine;

async function changeEngine(v) { settings.engine = v; await stSet('screener:settings', JSON.stringify(settings)); }

async function callDeepSeek(systemPrompt, userText) {
  let resp;
  try {
    resp = await fetch('/api/llm/deepseek', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'deepseek-chat',
      messages: [
        { role: 'system', content: systemPrompt },
        { role: 'user', content: userText }
      ],
      response_format: { type: 'json_object' },
      max_tokens: 4000,
      temperature: 0.3
    })
  });
  } catch (e) {
    throw new Error('DeepSeek接口网络请求失败（' + e.message + '）。请确认服务端已配置 DEEPSEEK_API_KEY。');
  }
  if (!resp.ok) {
    const t = await resp.text();
    throw new Error('DeepSeek API请求失败 (' + resp.status + ')：' + t.slice(0, 300) +
      (resp.status === 401 ? '\n（key无效或已作废，请更换）' : ''));
  }
  const data = await resp.json();
  if (!data.choices || !data.choices[0]) throw new Error('DeepSeek返回格式异常');
  return data.choices[0].message.content;
}

/**
 * 统一入口：根据设置和任务特性路由到 DeepSeek 或 Claude。
 * 自动切换Claude的情况：①内容含PDF/图片（DeepSeek不支持读文件）②需要联网搜索（项目阶段）。
 */
async function callLLM(systemPrompt, content, opts) {
  opts = opts || {};
  const hasBlocks = Array.isArray(content);
  const hasFiles = hasBlocks && content.some(b => b.type === 'document' || b.type === 'image');
  const useDS = settings.engine === 'deepseek' && !opts.webSearch && !hasFiles;
  if (useDS) {
    const text = hasBlocks ? content.filter(b => b.type === 'text').map(b => b.text).join('\n') : content;
    return { text: await callDeepSeek(systemPrompt, text), engine: 'DeepSeek' };
  }
  let label = 'Claude';
  if (settings.engine === 'deepseek') {
    if (hasFiles) label = 'Claude（含文件，自动切换）';
    else if (opts.webSearch) label = 'Claude（需联网，自动切换）';
  } else if (opts.webSearch) label = 'Claude（联网）';
  return { text: await callClaude(systemPrompt, content, opts.webSearch), engine: label };
}

async function callClaude(systemPrompt, userContent, useWebSearch) {
  // userContent 可以是字符串，也可以是内容块数组（含 document/image 块）
  const body = {
    model: 'claude-sonnet-4-6',
    max_tokens: 1000,
    system: systemPrompt,
    messages: [{ role: 'user', content: userContent }]
  };
  if (useWebSearch) body.tools = [{ type: 'web_search_20250305', name: 'web_search' }];
  let resp;
  try {
    resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
  } catch (e) {
    throw new Error('Claude接口网络请求被拦截（' + e.message + '）。最常见原因：本应用不是在 Claude 中打开的。内置Claude接口只在 claude.ai / Claude App 的应用环境中可用——请回到 Claude 对话里打开本应用，不要下载HTML后本地双击打开（左下角若显示"无持久化存储"警告即说明环境不对）。其他可能：网络波动，可重试。');
  }
  if (!resp.ok) {
    const t = await resp.text();
    throw new Error('API请求失败 (' + resp.status + ')：' + t.slice(0, 300));
  }
  const data = await resp.json();
  const texts = (data.content || []).filter(b => b.type === 'text').map(b => b.text);
  return texts.join('\n');
}

/* ---------- 简历文件（PDF/图片）：仅存于内存，评估结果持久化 ---------- */
const memFiles = {}; // { candidateId: [{name, size, media_type, kind:'pdf'|'image', data(base64)}] }
const ACCEPTED_IMG = ['image/jpeg','image/png','image/gif','image/webp'];

function filesOf(id) { if (!memFiles[id]) memFiles[id] = []; return memFiles[id]; }

function readFileB64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('文件读取失败：' + file.name));
    r.readAsDataURL(file);
  });
}

async function extractPdfText(file) {
  if (!window.pdfjsLib) throw new Error('pdf.js 未加载');
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const out = [];
  const n = Math.min(pdf.numPages, 20);
  for (let i = 1; i <= n; i++) {
    const page = await pdf.getPage(i);
    const tc = await page.getTextContent();
    out.push(tc.items.map(it => it.str).join(' '));
  }
  return out.join('\n\n');
}

async function onResumeFiles(input) {
  clearError('resumeErr');
  const list = filesOf(current.id);
  for (const f of Array.from(input.files)) {
    if (f.type === 'application/pdf') {
      if (f.size > 20 * 1024 * 1024) { showError('resumeErr', f.name + ' 超过20MB，请压缩后重试。'); continue; }
      // 优先本地提取文字层：体积小、可持久保存、可走DeepSeek
      let text = null;
      try { text = await extractPdfText(f); } catch(e) { text = null; }
      const data = await readFileB64(f);
      if (text && text.replace(/\s+/g, '').length > 200) {
        list.push({ name: f.name, size: f.size, media_type: 'application/pdf', kind: 'pdf-text', text: text, data: data });
      } else {
        // 无文字层（扫描件）→ 保留原文件走Claude视觉通道
        list.push({ name: f.name, size: f.size, media_type: 'application/pdf', kind: 'pdf', data: data });
      }
    } else if (ACCEPTED_IMG.includes(f.type)) {
      if (f.size > 5 * 1024 * 1024) { showError('resumeErr', f.name + ' 图片超过5MB，请压缩后重试。'); continue; }

    } else {
      showError('resumeErr', f.name + '：仅支持 PDF 和 JPG/PNG/GIF/WebP 图片。');
    }
  }
  input.value = '';
  current.stages.resume.fileMeta = list.map(x => ({ name: x.name, size: x.size, kind: x.kind, media_type: x.media_type || null, text: x.text || null, hasOriginal: !!x.data }));
  if (list.length) await ensureCurrentPersisted();
  await saveCandidateFiles(current.id);
  await saveCurrent();
  renderMain();
}

function resumeFileUrl(f) {
  if (!f || !f.data) return '';
  return 'data:' + (f.media_type || 'application/octet-stream') + ';base64,' + f.data;
}

function openResumeFile(i) {

function readFileText(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result || '');
    r.onerror = () => rej(new Error('文件读取失败：' + file.name));
    r.readAsText(file, 'utf-8');
  });
}

function normalizeExtractedText(text) {
  return String(text || '').replace(/\u0000/g, '').replace(/[ \t\r\f\v]+/g, ' ').replace(/\n{3,}/g, '\n\n').trim();
}

async function extractDocxText(file) {
  if (!window.mammoth) throw new Error('Word解析组件未加载，请刷新页面后重试。');
  const result = await window.mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
  return normalizeExtractedText(result.value || '');
}

async function extractLegacyDocText(file) {
  const buf = await file.arrayBuffer();
  const bytes = new Uint8Array(buf);
  let ascii = '';
  for (const b of bytes) ascii += (b >= 32 && b <= 126) || b === 10 || b === 13 || b === 9 ? String.fromCharCode(b) : ' ';
  const utf16 = new TextDecoder('utf-16le', { fatal: false }).decode(buf);
  const cleanAscii = normalizeExtractedText(ascii.replace(/\s{2,}/g, ' '));
  const cleanUtf16 = normalizeExtractedText(utf16.replace(/[^\u4e00-\u9fa5A-Za-z0-9，。！？、；：“”‘’（）《》,.!?;:'"()\-\s]/g, ' '));
  return cleanUtf16.replace(/\s+/g, '').length > cleanAscii.replace(/\s+/g, '').length ? cleanUtf16 : cleanAscii;
}

async function onTrialFile(input) {
  clearError('trialErr');
  const st = current.stages.trial;
  const texts = [];
  const metas = [];
  for (const f of Array.from(input.files)) {
    if (f.size > 20 * 1024 * 1024) { showError('trialErr', f.name + ' 超过20MB，请压缩或拆分后重试。'); continue; }
    try {
      let text = '';
      if (f.type === 'application/pdf' || /\.pdf$/i.test(f.name)) {
        text = await extractPdfText(f);
        if (!text || text.replace(/\s+/g, '').length < 200) {
          showError('trialErr', f.name + ' 未提取到足够文字。请从飞书导出为带文字层的PDF，或直接粘贴正文。');
          continue;
        }
      } else if (/\.txt$|\.md$|\.markdown$/i.test(f.name) || /^text\//.test(f.type)) {
        text = await readFileText(f);
      } else if (/\.docx$/i.test(f.name) || f.type === 'application/vnd.openxmlformats-officedocument.wordprocessingml.document') {
        text = await extractDocxText(f);
        if (!text || text.replace(/\s+/g, '').length < 200) {
          showError('trialErr', f.name + ' 未提取到足够正文。请确认不是空文档，或导出为PDF后重试。');
          continue;
        }
      } else if (/\.doc$/i.test(f.name) || f.type === 'application/msword') {
        text = await extractLegacyDocText(f);
        if (!text || text.replace(/\s+/g, '').length < 200) {
          showError('trialErr', f.name + ' 是旧版Word格式，未能可靠提取正文。建议另存为DOCX或导出PDF后上传。');
          continue;
        }
      } else {
        showError('trialErr', f.name + '：试稿上传目前支持 DOC、DOCX、PDF、TXT、Markdown。飞书文档建议先导出为PDF或DOCX后上传。');
        continue;
      }
      texts.push('【试稿文件：' + f.name + '】\n' + text.trim());
      metas.push({ name: f.name, size: f.size, textLength: text.replace(/\s+/g, '').length });
    } catch(e) {
      showError('trialErr', f.name + ' 读取失败：' + e.message);
    }
  }
  input.value = '';
  if (!texts.length) return;
  st.input = (st.input ? st.input.trim() + '\n\n' : '') + texts.join('\n\n');
  st.fileMeta = (st.fileMeta || []).concat(metas);
  if (current.persisted === false) await ensureCurrentPersisted();
  await saveCurrent();
  renderMain();
}

function fmtSize(b) { return b > 1048576 ? (b/1048576).toFixed(1) + ' MB' : Math.round(b/1024) + ' KB'; }

function parseJSONLoose(text) {
  let t = text.replace(/```json/gi, '').replace(/```/g, '').trim();
  const s = t.indexOf('{'), e = t.lastIndexOf('}');
  if (s === -1 || e === -1) throw new Error('模型未返回有效JSON');
  return JSON.parse(t.slice(s, e + 1));
}

function setLoading(btnId, on) {

// 学历门槛核验：本硕任一满足211/985即通过（一票否决项）
function normalizeSchool(name) {
  if (!name) return '';
  return String(name).replace(/[\s（）()、,，.。·]/g, '').trim();
}
const UNIV_211_NORM = UNIV_211.map(normalizeSchool);

// 独立学院/分校等易与母体211混淆的后缀：出现这些词一律不认定为211（除非精确等于名单项）
const EDU_EXCLUDE_SUFFIX = ['学院', '分校', '独立学院', '继续教育', '成人', '专科', '职业', '技术学院'];

function matchUniv(rawName) {
  // 返回：命中的名单项字符串 | null(非211) | '__REVIEW__'(疑似211分校，需人工确认)
  const norm = normalizeSchool(rawName);
  if (!norm) return null;
  // 1) 精确匹配（最可靠）
  let idx = UNIV_211_NORM.indexOf(norm);
  if (idx !== -1) return UNIV_211[idx];
  // 2) "名单项 + 括号校区说明"（如 哈尔滨工业大学（深圳））直接认定
  idx = UNIV_211_NORM.findIndex(fn => fn.length >= 4 && norm.startsWith(fn) &&
    /^[（(]?(北京|武汉|华东|保定|东营|威海|珠海|深圳|校区)?[)）]?$/.test(norm.slice(fn.length)));
  if (idx !== -1) return UNIV_211[idx];
  // 3) 含"学院/分校"等后缀：需区分"211的分校区(算)"与"独立学院/双非(不算)"，机器无法可靠判定→交人工
  const hasBranchSuffix = EDU_EXCLUDE_SUFFIX.some(sfx => norm.endsWith(sfx));
  if (hasBranchSuffix) {
    // 若去掉"分校/校区"后精确等于某211，视为疑似分校待确认；否则(如独立学院)判否
    const stripped = norm.replace(/(威海|青岛|深圳|珠海|北京|武汉|华东|保定)?(分校|校区)$/, '');
    if (UNIV_211_NORM.indexOf(stripped) !== -1 && /分校|校区/.test(norm)) return '__REVIEW__';
    return null;
  }
  return null;
}

function checkEducation(education) {
  // 返回 { status: 'pass'|'fail'|'unknown', matched: [...], details: [...] }
  if (!education || !education.length) {
    return { status: 'unknown', matched: [], details: ['简历未提取到教育经历，请人工核实学历。'] };
  }
  const relevant = education.filter(e => !e.level || /本科|硕士|博士|研究生/.test(e.level));
  const details = [];
  const matched = [];
  let needReview = false;
  for (const e of (relevant.length ? relevant : education)) {
    const hit = matchUniv(e.school);
    if (hit === '__REVIEW__') {
      needReview = true;
      details.push((e.level || '学历') + '　' + (e.school || '') + '　⚠ 疑似211分校，请人工确认');
    } else if (hit) {
      matched.push((e.level || '') + '：' + e.school + ' → 命中 ' + hit);
      details.push((e.level || '学历') + '　' + e.school + '　✓ 211/985');
    } else {
      details.push((e.level || '学历') + '　' + (e.school || '（校名缺失）') + '　非211/985');
    }
  }
  let status = matched.length ? 'pass' : (needReview ? 'unknown' : 'fail');
  return { status, matched, details };
}

function priorContext() {
  const s = current.stages;
  const parts = [];
  if (s.material && s.material.result) parts.push('【材料综合评估结果】\n' + JSON.stringify(s.material.result));
  if (s.resume.result) parts.push('【简历阶段评估结果】\n' + JSON.stringify(s.resume.result));
  if (s.project.result) parts.push('【项目阶段评估结果】\n' + JSON.stringify(s.project.result));
  if (s.interview.result) parts.push('【面试阶段评估结果】\n' + JSON.stringify(s.interview.result));
  if (s.trial.result) parts.push('【试稿阶段评估结果】\n' + JSON.stringify(s.trial.result));
  return parts.join('\n\n');
}

async function runResume(opts) {
  opts = opts || {};
  const btnId = opts.buttonId || 'resumeBtn';
  const shouldRender = opts.render !== false;
  const manageLoading = opts.manageLoading !== false;
  const st = current.stages.resume;
  st.input = document.getElementById('resumeInput').value;
  const files = filesOf(current.id);
  // 提取的简历文字：优先本次上传，其次是已持久保存的
  let extractedTexts = files.filter(f => f.kind === 'pdf-text').map(f => ({ name: f.name, text: f.text }));
  if (!files.length && st.fileMeta) {
    extractedTexts = st.fileMeta.filter(m => m.text).map(m => ({ name: m.name, text: m.text }));
  }
  const binFiles = files.filter(f => f.kind === 'pdf' || f.kind === 'image');
  if (!st.input.trim() && !binFiles.length && !extractedTexts.length) {
    if (st.fileMeta && st.fileMeta.length) {
      showError('resumeErr', '候选人记录里只有旧版文件摘要「' + st.fileMeta.map(m => m.name).join('、') + '」，没有可读取的原文件数据；请重新上传后再评估。');
    } else {
      showError('resumeErr', '请上传简历文件（PDF/图片）或粘贴简历文字。项目材料可在下方一起填写。');
    }
    return;
  }
  if (current.persisted === false) await ensureCurrentPersisted();
  clearError('resumeErr');
  if (manageLoading) setLoading(btnId, true);
  try {
    const blocks = [];
    for (const f of binFiles) {
      if (f.kind === 'pdf') blocks.push({ type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: f.data } });
      else blocks.push({ type: 'image', source: { type: 'base64', media_type: f.media_type, data: f.data } });
    }
    let textPart = isPendingName(current.name)
      ? '当前候选人姓名尚未录入。请从简历材料中识别candidateName；不要把系统临时显示名当作姓名。'
      : '当前候选人显示名：' + current.name + '。仍请以简历材料为准校验candidateName。';
    if (binFiles.length) textPart += '\n以上文件即候选人简历（' + binFiles.map(f => f.name).join('、') + '），请完整读取后评估。';
    for (const t of extractedTexts) {
      textPart += '\n\n【简历文件《' + t.name + '》提取的文字（提取自PDF文字层，排版信息已丢失，请勿因排版扣分）】\n' + t.text;
    }
    if (st.input.trim()) textPart += '\n\n【补充文字/简历原文】\n' + st.input;
    blocks.push({ type: 'text', text: textPart });
    const r = await callLLM(RESUME_PROMPT, blocks, {});
    st.result = parseJSONLoose(r.text);
    st.engine = r.engine;
    st.result.eduCheck = checkEducation(st.result.education);
    await applyDetectedProfile(st.result);
    st.at = new Date().toISOString();
    await saveCurrent();
    if (shouldRender) { renderSidebar(); renderMain(); }
    return true;
  } catch(e) {
    showError('resumeErr', e.message);
    return false;
  } finally {
    if (manageLoading) setLoading(btnId, false);
  }
}

function extractUrls(text) {
  return Array.from(new Set((text.match(/https?:\/\/[^\s"'<>，。；;]+/g) || []).map(u => u.trim())));
}

async function fetchProjectSources(urls) {
  if (!urls.length) return [];
  try {
    const resp = await fetch(API_BASE + '/api/fetch-projects', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ urls })
    });
    if (!resp.ok) throw new Error('本地抓取接口失败 ' + resp.status);
    const data = await resp.json();
    if (!data.ok) throw new Error(data.error || '本地抓取接口失败');
    return data.results || [];
  } catch(e) {
    return urls.map(url => ({ url, ok: false, error: '本地服务抓取失败：' + e.message }));
  }
}

function projectSourceText(sources) {
  if (!sources.length) return '';
  return '\n\n【系统抓取的项目链接公开内容】\n' + sources.map(s => {
    if (!s.ok) return '链接：' + s.url + '\n抓取失败：' + (s.error || '未知原因');
    const text = (s.text || '').trim();
    return '链接：' + s.url +
      '\nHTTP状态：' + (s.status || 'unknown') +
      '\n内容类型：' + (s.contentType || 'unknown') +
      (s.truncated ? '\n备注：内容较长，已截断。' : '') +
      '\n正文摘录：\n' + (text || '（页面无可提取正文，可能是纯前端渲染页面）');
  }).join('\n\n---\n\n');
}

async function runProject(opts) {
  opts = opts || {};
  const btnId = opts.buttonId || 'projBtn';
  const shouldRender = opts.render !== false;
  const manageLoading = opts.manageLoading !== false;
  const allowEmpty = opts.allowEmpty === true;
  const st = current.stages.project;
  st.input = document.getElementById('projLinks').value;
  const notesEl = document.getElementById('resumeInput');
  st.notes = notesEl ? notesEl.value : (st.notes || current.stages.resume.input || '');
  if (!st.input.trim() && !st.notes.trim()) {
    if (!allowEmpty) { showError('projErr', '请填写项目链接，或粘贴项目相关材料。'); return false; }
    if (current.persisted === false) await ensureCurrentPersisted();
    st.result = emptyProjectResult();
    st.engine = '系统规则';
    st.at = new Date().toISOString();
    await saveCurrent();
    if (shouldRender) { renderSidebar(); renderMain(); }
    return true;
  }
  if (current.persisted === false) await ensureCurrentPersisted();
  clearError('projErr');
  if (manageLoading) setLoading(btnId, true);
  try {
    const urls = extractUrls(st.input + '\n' + st.notes);
    const sources = await fetchProjectSources(urls);
    let msg = '候选人姓名：' + current.name + '\n\n【项目链接】\n' + (st.input || '（无链接）');
    if (st.notes.trim()) msg += '\n\n【补充说明】\n' + st.notes;

    const prior = current.stages.resume.result ? '\n\n【前序阶段结果，用于交叉验证】\n' + JSON.stringify(current.stages.resume.result) : '';
    const r = await callLLM(PROJECT_PROMPT, msg + prior, {});
    st.result = parseJSONLoose(r.text);
    st.engine = r.engine;
    st.at = new Date().toISOString();
    await saveCurrent();
    if (shouldRender) { renderSidebar(); renderMain(); }
    return true;
  } catch(e) {
    showError('projErr', e.message);
    return false;
  } finally {
    if (manageLoading) setLoading(btnId, false);
  }
}

  try {
    const resumeOK = await runResume({ buttonId: 'materialBtn', render: false, manageLoading: false });
    if (!resumeOK) return;
    const projectOK = await runProject({ buttonId: 'materialBtn', render: false, manageLoading: false, allowEmpty: true });
    if (!projectOK) return;
    await runMaterialSummary();
    renderSidebar();
    renderMain();
  } finally {
    setLoading('materialBtn', false);
  }
}

async function runOutline() {
  const st = current.stages.interview;
  clearError('ivErr'); setLoading('outlineBtn', true);
  try {
    const prior = priorContext();
    if (!prior) throw new Error('请先完成至少一个前序阶段的评估，才能生成个性化提纲。');
    const r = await callLLM(OUTLINE_PROMPT, '候选人姓名：' + current.name + '\n\n' + prior, {});
    st.outline = parseJSONLoose(r.text);
    await saveCurrent(); renderMain();
  } catch(e) { showError('ivErr', e.message); }
  setLoading('outlineBtn', false);
}

async function runInterview() {
  const st = current.stages.interview;
  st.input = document.getElementById('ivInput').value;
  if (!st.input.trim()) { showError('ivErr', '请先粘贴腾讯会议转写文本。'); return; }
  clearError('ivErr'); setLoading('ivBtn', true);
  try {
    const prior = priorContext();
    const r = await callLLM(INTERVIEW_PROMPT,
      '候选人姓名：' + current.name + '\n\n【面试转写文本】\n' + st.input + (prior ? '\n\n【前序阶段结果，用于交叉验证】\n' + prior : ''), {});
    st.result = parseJSONLoose(r.text);
    st.engine = r.engine;
    st.at = new Date().toISOString();
    await saveCurrent(); renderSidebar(); renderMain();
  } catch(e) { showError('ivErr', e.message); }
  setLoading('ivBtn', false);
}

function countChineseWords(text) {
  return text.replace(/\s+/g, '').length;
}

async function runTrial() {
  const st = current.stages.trial;
  st.input = document.getElementById('trialInput').value;
  if (!st.input.trim()) { showError('trialErr', '请先粘贴试稿全文。'); return; }
  clearError('trialErr'); setLoading('trialBtn', true);
  try {
    const wc = countChineseWords(st.input);
    const prior = priorContext();
    const msg = '候选人姓名：' + current.name +
      '\n\n【系统统计字数（去空白字符）】' + wc +
      '\n\n【试稿全文】\n' + st.input +
      (prior ? '\n\n【前序阶段结果，用于交叉验证】\n' + prior : '');
    const r = await callLLM(TRIAL_PROMPT, msg, {});
    st.result = parseJSONLoose(r.text);
    st.engine = r.engine;
    st.at = new Date().toISOString();
    await saveCurrent(); renderSidebar(); renderMain();
  } catch(e) { showError('trialErr', e.message); }
  setLoading('trialBtn', false);
}

async function runFinal() {
  const st = current.stages.final;
  clearError('finalErr'); setLoading('finalBtn', true);
  try {
    const done = ['resume','project','interview','trial'].filter(k => current.stages[k].result);
    if (done.length < 2) throw new Error('至少需要完成两个阶段的评估，才能生成综合报告。');
    const r = await callLLM(FINAL_PROMPT, '候选人姓名：' + current.name + '\n\n' + priorContext(), {});
    st.result = parseJSONLoose(r.text);
    st.engine = r.engine;
    st.at = new Date().toISOString();
    await saveCurrent(); renderMain();
  } catch(e) { showError('finalErr', e.message); }
  setLoading('finalBtn', false);
}

async function persistInputs() {
  if (!current) return;
  const g = id => { const el = document.getElementById(id); return el ? el.value : null; };
  const v1 = g('resumeInput'); if (v1 !== null) current.stages.resume.input = v1;
  const v2 = g('projLinks'); if (v2 !== null) current.stages.project.input = v2;
  if (v1 !== null) current.stages.project.notes = v1;
  const v4 = g('ivInput'); if (v4 !== null) current.stages.interview.input = v4;
  const v5 = g('trialInput'); if (v5 !== null) current.stages.trial.input = v5;
  const hasResumeText = !!(current.stages.resume.input && current.stages.resume.input.trim());
  const hasResumeFiles = !!(memFiles[current.id] && memFiles[current.id].length);
  const hasProjectMaterial = !!((current.stages.project.input && current.stages.project.input.trim()) ||
    (current.stages.project.notes && current.stages.project.notes.trim()));
  if (current.persisted === false && (hasResumeText || hasResumeFiles || hasProjectMaterial)) await ensureCurrentPersisted();
  await saveCurrent();
}

/* ================================================================
   渲染层
================================================================ */
function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function jsArg(s) {
  return JSON.stringify(String(s || ''));
}

const TIER_CLASS = {
  '推荐面试':'tag-good','边缘':'tag-mid','不推荐':'tag-bad',
  '建议给试稿':'tag-good','谨慎给试稿':'tag-mid','不建议给试稿':'tag-bad',
  '加分':'tag-good','中性':'tag-neutral','存疑':'tag-mid',
  '进入试稿':'tag-good',
  '通过·发offer':'tag-good','修改后复评':'tag-mid','不通过':'tag-bad',
  '录用':'tag-good','谨慎录用':'tag-mid','不录用':'tag-bad',
  '高':'tag-good','中':'tag-mid','低':'tag-bad'
};
function tierTag(t) { return '<span class="tag ' + (TIER_CLASS[t] || 'tag-neutral') + '">' + esc(t) + '</span>'; }

function stageDotClass(stage) {
  const r = stage.result;
  if (!r) return '';
  if (r.eduCheck && r.eduCheck.status === 'fail') return 'bad';
  const tier = r.conclusion ? r.conclusion.tier : (r.recommendation ? r.recommendation.decision : '');
  if (/不推荐|不通过|不录用|明显不符/.test(tier)) return 'bad';
  if (/边缘|存疑|修改|谨慎/.test(tier)) return 'flag';
  return 'done';
}

function materialDotClass(stages) {
  const m = stageDotClass(stages.material || {});
  if (m) return m;
  const a = stageDotClass(stages.resume);
  const b = stageDotClass(stages.project);
  if (a === 'bad' || b === 'bad') return 'bad';
  if (a === 'flag' || b === 'flag') return 'flag';
  if (a === 'done' || b === 'done') return 'done';
  return '';
}

function hasAnyEvaluation(stages) {
  return !!(stages && (
    (stages.material && stages.material.result) ||
    (stages.resume && stages.resume.result) ||
    (stages.project && stages.project.result) ||
    (stages.interview && stages.interview.result) ||
    (stages.trial && stages.trial.result) ||
    (stages.final && stages.final.result)
  ));
}

function renderSidebar() {
  const list = document.getElementById('candList');
  const candTextHtml = item => {
    const meta = [item.gender, item.educationStage, item.graduationYear ? item.graduationYear + '届' : ''].filter(Boolean).join(' · ');
    return '<span class="cand-text"><span class="name">' + esc(item.name) +
      (meta ? '<small> · ' + esc(meta) + '</small>' : '') + '</span>' +
      (item.school ? '<span class="school">' + esc(item.school) + '</span>' : '') + '</span>';
  };
  const draftHtml = current && current.persisted === false
    ? '<div class="cand-item active">' + candTextHtml(current) +
      '<span style="font-size:11px;color:var(--warning);flex-shrink:0">未保存</span></div>'
    : '';
  if (!index.length) {
    list.innerHTML = draftHtml || '<div style="padding:20px 10px;font-size:13px;color:var(--text-400)">还没有候选人。点击上方“新增候选人”，进入页面后录入简历和项目材料。</div>';
    return;
  }
  list.innerHTML = draftHtml + index.map(item => {
    const isActive = current && current.id === item.id;
    let dots = '<span class="dot"></span>'.repeat(4);
    if (isActive) {
      dots = '<span class="dot ' + materialDotClass(current.stages) + '"></span>' +
        ['interview','trial'].map(k => '<span class="dot ' + stageDotClass(current.stages[k]) + '"></span>').join('');
    }
    return '<div class="cand-item' + (isActive ? ' active' : '') + '" onclick="openCandidate(\'' + item.id + '\')">' +
      candTextHtml(item) +
      '<span style="display:flex;align-items:center;gap:6px">' +
      (isActive ? '<span class="stage-dots">' + dots + '</span>' : '') +
      '<button class="del" title="删除" onclick="deleteCandidate(\'' + item.id + '\', event)">×</button></span></div>';
  }).join('');
}

async function switchTab(t) { await persistInputs(); activeTab = t; renderMain(); }

function renderMain() {
  const area = document.getElementById('mainArea');
  if (adminMode) {
    area.innerHTML = renderAdminPage();
    return;
  }
  if (!current) {
    area.innerHTML = '<div class="empty-state"><h2>候选人评估</h2>' +
      '<p>材料初筛 → 面试分析 → 试稿评审。每进入新阶段，系统会自动与前序材料交叉验证，让不一致的地方自己浮出来。</p>' +
      '<div class="btn-row" style="justify-content:center;margin-top:22px"><button class="btn btn-primary" onclick="addCandidate()">新增候选人</button></div></div>';
    return;
  }
  const s = current.stages;
  const anyDone = hasAnyEvaluation(s);
  if (activeTab === 'overview' && !anyDone) activeTab = 'resume';
  const tabs = [
    ...(anyDone ? [['overview','概览', true]] : []),
    ['resume','① 材料', !!((s.material && s.material.result) || s.resume.result || s.project.result)],
    ['interview','② 面试', !!s.interview.result],
    ['trial','③ 试稿', !!s.trial.result],
    ['final','综合报告', !!s.final.result]
  ];
  const nameHint = current.persisted === false
    ? ' · 临时草稿，录入简历或项目材料后保存'
    : (isPendingName(current.name) ? ' · 简历评估后自动识别姓名' : '');
  let html = '<div class="cand-header"><h2>' + esc(current.name) + '</h2>' +
    '<div class="meta">创建于 ' + new Date(current.createdAt).toLocaleDateString('zh-CN') + nameHint + '</div></div>';
  html += '<div class="tabs">' + tabs.map(([k, label, done]) =>
    '<button class="tab' + (activeTab === k ? ' active' : '') + '" onclick="switchTab(\'' + k + '\')">' +
    label + (done ? ' <span class="tick">✓</span>' : '') + '</button>').join('') + '</div>';

  if (activeTab === 'overview') html += renderOverviewTab();
  else if (activeTab === 'resume') html += renderResumeTab();
  else if (activeTab === 'interview') html += renderInterviewTab();
  else if (activeTab === 'trial') html += renderTrialTab();
  else html += renderFinalTab();

  area.innerHTML = html;
}

function renderAdminPage() {
  if (!currentUserIsAdmin) {
    return '<div class="empty-state"><h2>无权限访问</h2><p>只有管理员账号可以管理登录账号。</p></div>';

      return '<div class="account-row"><div><div class="account-name">' + esc(u.username) +
        (isAdmin ? ' <span class="tag tag-good" style="font-size:11px;padding:1px 8px">管理员</span>' : '') +
        '</div><div class="account-meta">' + (updated ? '最近更新：' + esc(updated) : '已启用') + '</div></div>' +
        '<span class="tag tag-neutral">' + (isAdmin ? '不可删除' : '普通账号') + '</span>' +
        (isAdmin ? '<button class="danger-btn" disabled style="opacity:.45;cursor:not-allowed">删除</button>' :
          '<button class="danger-btn" onclick="removeAdminUser(' + jsArg(u.username) + ')">删除</button>') +
