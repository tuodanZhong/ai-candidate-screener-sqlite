  return '<div class="cand-header"><h2>账号管理</h2>' +
    '<div class="meta">管理员：' + esc(currentUser || '未识别') + '。新增账号后即可用账号密码登录。</div></div>' +
    '<div class="card"><h3>添加或重置账号</h3>' +
    '<div class="hint">输入账号名和密码。若账号已存在，会重置该账号的密码；管理员账号「钟志远」不能删除。</div>' +
    '<div class="account-form">' +
    '<input id="adminUsername" placeholder="账号名，例如：张三">' +
    '<input id="adminPassword" type="password" placeholder="密码">' +
    '<button id="adminSaveBtn" class="btn btn-primary" onclick="saveAdminUser()"><span class="spinner" style="display:none"></span>保存账号</button>' +
    '</div><div class="error-box" id="adminErr" style="display:none"></div></div>' +
    '<div class="card"><div class="result-header"><h4>当前账号</h4><span class="tag tag-neutral">' + adminUsers.length + ' 个</span></div>' +
    rows + '</div>';
}

function dimRows(dims) {
  if (!dims || !dims.length) return '';
  return dims.map(d => {
    const sc = d.score;
    const pct = sc ? (sc / 5 * 100) : 0;
    return '<div class="dim-row"><div class="dim-top"><span class="dim-name">' + esc(d.name) + '</span>' +
      '<span class="score-wrap"><span class="score-bar"><span class="score-fill" style="width:' + pct + '%"></span></span>' +
      '<span class="score-num">' + (sc === null || sc === undefined ? '—' : sc) + '<small>/5</small></span></span></div>' +
      '<ul class="evidence">' +
      (d.evidence || []).map(e => '<li>' + esc(e) + '</li>').join('') +
      (d.concerns || []).filter(Boolean).map(c => '<li class="concern">⚠ ' + esc(c) + '</li>').join('') +
      '</ul></div>';
  }).join('');
}

function dimOverview(dims) {
  if (!dims || !dims.length) return '';
  return '<div class="material-overview">' + dims.map(d => {
    const sc = d.score;
    const pct = sc ? (sc / 5 * 100) : 0;
    const details = []
      .concat((d.evidence || []).map(e => '<li>' + esc(e) + '</li>'))
      .concat((d.concerns || []).filter(Boolean).map(c => '<li class="concern">⚠ ' + esc(c) + '</li>'))
      .join('');
    return '<details class="dim-tile"><summary>' +
      '<span class="dim-tile-name">' + esc(d.name) + '</span>' +
      '<span class="dim-tile-score">' + (sc === null || sc === undefined ? '—' : sc) + '<small>/5</small></span>' +
      '<span class="dim-tile-bar"><span class="dim-tile-fill" style="width:' + pct + '%"></span></span>' +
      '</summary><div class="dim-tile-body"><ul>' + (details || '<li>暂无展开信息</li>') + '</ul></div></details>';
  }).join('') + '</div>';
}

function gateOverview(gates) {
  if (!gates || !gates.length) return '';
  return '<div class="section-label">硬性门槛</div><div class="gate-strip">' + gates.map(g => {
    const status = g.status || '存疑';
    const cls = status === '通过' ? 'gate-pass' : (status === '不通过' ? 'gate-fail' : 'gate-risk');
    const tagCls = status === '通过' ? 'tag-good' : (status === '不通过' ? 'tag-bad' : 'tag-mid');
    return '<div class="gate-chip ' + cls + '"><div class="gate-top">' +
      '<span class="gate-name">' + esc(g.item || '未命名门槛') + '</span>' +
      '<span class="tag ' + tagCls + '">' + esc(status) + '</span></div>' +
      (g.notes ? '<div class="gate-note">' + esc(g.notes) + '</div>' : '') + '</div>';
  }).join('') + '</div>';
}

function qList(qs, title) {
  if (!qs || !qs.length) return '';
  return '<div class="section-label">' + title + '</div><ol class="q-list">' +
    qs.map(q => typeof q === 'string'
      ? '<li>' + esc(q) + '</li>'
      : '<li>' + esc(q.q) + '<span class="purpose">考察目的：' + esc(q.purpose) + '</span></li>'
    ).join('') + '</ol>';
}

function flagList(items, cls, prefix, title) {
  if (!items || !items.length) return '';
  return '<div class="section-label">' + title + '</div><ul class="flag-list">' +
    items.map(i => '<li class="' + cls + '">' + prefix + ' ' + esc(i) + '</li>').join('') + '</ul>';
}

function resultShell(r, extra, title) {
  const tier = r.conclusion ? r.conclusion.tier : '';
  const summary = r.conclusion ? r.conclusion.summary : '';
  return '<div class="card"><div class="result-header"><h4>' + esc(title || '评估结果') + '</h4>' + (tier ? tierTag(tier) : '') + '</div>' +
    (summary ? '<div class="result-summary">' + esc(summary) + '</div>' : '') +
    dimRows(r.dimensions) + (extra || '') + '</div>';
}

function trialRecommendationBlock(rec) {
  if (!rec) return '';
  return '<div class="section-label">付费试稿建议</div>' +
    '<div class="next-step" style="margin-bottom:10px"><div><div class="k">是否给试稿</div>' +
    '<div class="v">' + esc(rec.decision || '未判断') + '</div>' +
    (rec.costRationale ? '<div class="stage-summary" style="margin-top:4px">' + esc(rec.costRationale) + '</div>' : '') +
    '</div>' + tierTag(rec.decision || '未判断') + '</div>' +
    qList(rec.trialFocus, '如果给试稿，重点验证');
}

function stageResult(stageKey) {
  const st = current.stages[stageKey];
  if (!st) return null;
  return stageKey === 'interview' && st.outline && !st.result ? null : st.result;
}

function stageTierText(stageKey) {
  const r = stageResult(stageKey);
  if (!r) return '未开始';
  if (r.recommendation) return r.recommendation.decision || '已评估';
  return (r.conclusion && r.conclusion.tier) || '已评估';
}

function stageSummaryText(stageKey) {
  const r = stageResult(stageKey);
  if (!r) return '暂无评估结果。';
  if (r.recommendation) return r.recommendation.rationale || '已生成综合报告。';
  return (r.conclusion && r.conclusion.summary) || '已完成该阶段评估。';
}

function currentStageText() {
  const s = current.stages;
  const materialTier = stageTierText('material');
  const interviewTier = stageTierText('interview');
  const trialTier = stageTierText('trial');
  if (!s.material || !s.material.result) return { label: '待材料评估', note: '先上传简历和项目材料，生成第一轮综合判断。' };
  if (/不推荐/.test(materialTier)) return { label: '材料初筛未通过', note: '除非HR有额外强证据，否则不建议继续推进。' };
  if (!s.interview.result) return { label: '待面试', note: '材料已评估，可进入面试验证自驱力、逻辑能力和项目真实性。' };
  if (/不推荐|不建议给试稿/.test(interviewTier)) return { label: '不建议给试稿', note: '面试后判断不值得支付试稿成本。' };
  if (/谨慎给试稿/.test(interviewTier) && !s.trial.result) return { label: '谨慎给试稿', note: '存在亮点但风险未消除，是否付费试稿需HR二次确认。' };
  if (!s.trial.result) return { label: '待试稿', note: '面试后建议进入试稿，用付费试稿验证真实产出能力。' };
  if (/不通过/.test(trialTier)) return { label: '试稿未通过', note: '核心岗位能力未达标，建议停止推进。' };
  if (!s.final.result) return { label: '待综合报告', note: '关键阶段已有结果，可生成最终综合报告。' };
  return { label: '流程已完成', note: stageSummaryText('final') };
}

function renderStageBoard() {
  const stages = [
    ['material', '材料综合评估'],
    ['interview', '面试评估'],
    ['trial', '试稿评估'],
    ['final', '最终综合报告']
  ];
  return '<div class="card"><div class="result-header"><h4>各阶段评估情况</h4></div>' +
    '<div class="stage-board">' + stages.map(([key, title]) => {
      const tier = stageTierText(key);
      const done = tier !== '未开始';
      const cls = done ? (TIER_CLASS[tier] || 'tag-neutral') : 'tag-neutral';
      return '<div class="stage-card"><div class="stage-head"><span class="stage-title">' + esc(title) + '</span>' +
        '<span class="tag ' + cls + '">' + esc(tier) + '</span></div>' +
        '<div class="stage-summary">' + esc(stageSummaryText(key)) + '</div></div>';
    }).join('') + '</div></div>';
}

function renderOverviewTab() {
  const step = currentStageText();
  const profile = [
    ['姓名', current.name],
    ['性别', current.gender || '未识别'],
    ['学校', current.school || '未识别'],
    ['学历阶段', current.educationStage || '未识别'],
    ['毕业年份', current.graduationYear ? current.graduationYear + '届' : '未识别'],
    ['创建时间', new Date(current.createdAt).toLocaleDateString('zh-CN')]
  ];
  let html = '<div class="next-step"><div><div class="k">当前阶段</div><div class="v">' + esc(step.label) + '</div>' +
    '<div class="stage-summary" style="margin-top:4px">' + esc(step.note) + '</div></div>' +
    '<button class="btn btn-secondary" onclick="switchTab(\'resume\')">补充材料</button></div>';
  html += '<div class="card"><div class="result-header"><h4>基本信息</h4></div><div class="profile-grid">' +
    profile.map(([k, v]) => '<div class="profile-item"><div class="label">' + esc(k) + '</div><div class="value">' + esc(v) + '</div></div>').join('') +
    '</div></div>';
  html += renderResumeFilesOverview();
  html += renderStageBoard();
  html += renderMaterialSummary();
  if (current.stages.final && current.stages.final.result) {
    html += renderFinalReportSummary();
  }
  return html;
}

function renderResumeFilesOverview() {
  const files = filesOf(current.id);
  const meta = (current.stages.resume && current.stages.resume.fileMeta) || [];
  if (!files.length && !meta.length) return '';
  let html = '<div class="card"><div class="result-header"><h4>已上传简历</h4>' +
    '<button class="btn btn-secondary" onclick="switchTab(\'resume\')">管理材料</button></div>';
  if (files.length) {
    html += files.map((f, i) => {
      const tag = f.kind === 'pdf-text'
        ? ' <span class="tag tag-good" style="font-size:11px;padding:1px 8px">文字已提取</span>'
        : (f.kind === 'pdf' ? ' <span class="tag tag-mid" style="font-size:11px;padding:1px 8px">扫描件</span>' : '');
      const actions = f.data
        ? '<button onclick="openResumeFile(' + i + ')" title="查看原文件">查看</button><button onclick="downloadResumeFile(' + i + ')" title="下载原文件">下载</button>'
        : '<span style="font-size:12px;color:var(--warning)">旧版无原文件</span>';
      return '<div class="file-chip"><span>📄 ' + esc(f.name) + ' <small>' + fmtSize(f.size) + '</small>' + tag +
        '</span><span style="display:flex;align-items:center;gap:8px;flex-shrink:0">' + actions + '</span></div>';
    }).join('');
  } else {
    html += '<div style="font-size:12.5px;color:var(--warning)">仅找到旧版文件摘要，未找到可查看/下载的原文件；请进入材料页重新上传。</div>';
  }
  html += '</div>';
  return html;
}

function renderMaterialSummary() {
  const st = current.stages.material;
  const r = st && st.result;
  if (!r) return '';
  let extra = '';
  extra += gateOverview(r.hardGates);
  extra += dimOverview(r.dimensions);
  if (r.materialCoverage) {
    extra += '<div class="section-label">材料覆盖度</div>' +
      '<div class="hard-req"><span class="tag tag-neutral">' + esc(r.materialCoverage.level || '未标注') + '</span>' +
      '<span>' + esc(r.materialCoverage.notes || '') + '</span></div>';
  }
  if (r.interviewFocus && r.interviewFocus.length) {
    extra += '<details class="fold-block"><summary>面试中可以追问的问题</summary>' +
      qList(r.interviewFocus, '建议追问') + '</details>';
  }
  return resultShell(Object.assign({}, r, { dimensions: [] }), extra, '材料综合评估');
}

/* ---------- 各标签页 ---------- */
function renderResumeTab() {
  const st = current.stages.resume;
  const pst = current.stages.project;
  const files = filesOf(current.id);
  const materialNotes = st.input || pst.notes || '';
  let fileArea = '<div class="upload-zone" onclick="document.getElementById(\'resumeFile\').click()">' +
    '<div style="font-size:14px;color:var(--text-100);font-weight:500">点击上传简历文件</div>' +
    '<div style="font-size:12.5px;color:var(--text-400)">支持 PDF（≤20MB）和 JPG/PNG 等图片（每张≤5MB），多页截图可一次多选</div>' +
    '<input type="file" id="resumeFile" accept=".pdf,image/jpeg,image/png,image/gif,image/webp" multiple style="display:none" onchange="onResumeFiles(this)"></div>';
  if (files.length) {
    fileArea += files.map((f, i) => {
      const tag = f.kind === 'pdf-text'
        ? ' <span class="tag tag-good" style="font-size:11px;padding:1px 8px">文字已提取</span>'
        : (f.kind === 'pdf' ? ' <span class="tag tag-mid" style="font-size:11px;padding:1px 8px">扫描件·走Claude视觉</span>' : '');
      const actions = f.data
        ? '<button onclick="openResumeFile(' + i + ')" title="查看原文件">查看</button><button onclick="downloadResumeFile(' + i + ')" title="下载原文件">下载</button>'
        : '<span style="font-size:12px;color:var(--warning)">旧版无原文件</span>';
      return '<div class="file-chip"><span>📄 ' + esc(f.name) + ' <small>' + fmtSize(f.size) + '</small>' + tag +
        '</span><span style="display:flex;align-items:center;gap:8px;flex-shrink:0">' + actions +
        '<button onclick="removeResumeFile(' + i + ')" title="移除">×</button></span></div>';
    }).join('');
  } else if (st.fileMeta && st.fileMeta.length) {
    const withText = st.fileMeta.filter(m => m.text);
    if (withText.length) {
      fileArea += '<div style="font-size:12.5px;color:var(--success);margin-top:8px">✓ 已保存文件文字：' +
        esc(withText.map(m => m.name).join('、')) + '（可直接重新评估，无需重新上传）</div>';
    }
    const noText = st.fileMeta.filter(m => !m.text);
    if (noText.length) {
      fileArea += '<div style="font-size:12.5px;color:var(--warning);margin-top:8px">旧版文件摘要：' +
        esc(noText.map(m => m.name).join('、')) + '（未找到原文件数据，重新评估需重新上传）</div>';
    }
  }
  const inputCard = '<div class="card"><h3>材料评估</h3>' +
    '<div class="hint">录入候选人随投递一起给的简历和项目链接。系统会一次完成简历初筛、姓名/学校识别、项目质量判断，并把两部分材料交叉验证。</div>' +
    '<div class="section-label">简历材料</div>' +
    fileArea +
    '<div class="section-label">项目链接</div>' +
    '<div class="hint">每行一个 GitHub / 作品网站 / 在线 Demo 链接。系统会重点看项目是否完整用心、页面是否美观、功能复杂度是否有含金量。</div>' +
    '<textarea id="projLinks" class="short" placeholder="https://github.com/…&#10;https://…" onblur="persistInputs()">' + esc(pst.input) + '</textarea>' +
    '<div class="section-label">补充说明（可选）</div>' +
    '<textarea id="resumeInput" class="short" placeholder="如有文字版简历、投递背景、候选人备注或其他需要说明的信息，可粘贴在这里。" onblur="persistInputs()">' + esc(materialNotes) + '</textarea>' +
    '<div class="btn-row"><button id="materialBtn" class="btn btn-primary" onclick="runMaterials()"><span class="spinner" style="display:none"></span>评估材料</button>' +
    (current.stages.material && current.stages.material.at ? '<span style="font-size:12px;color:var(--text-400)">上次材料综合评估：' +
      new Date(current.stages.material.at).toLocaleString('zh-CN') +
      (current.stages.material.engine ? ' · ' + esc(current.stages.material.engine) : '') + '</span>' : '') +
    '</div><div class="error-box" id="resumeErr" style="display:none"></div><div class="error-box" id="projErr" style="display:none"></div></div>';
  let html = '';
  if (current.stages.material && current.stages.material.result) {
    html += renderMaterialSummary();
    html += '<details class="quiet-edit"><summary>修改或补充材料后重新评估</summary>' + inputCard + '</details>';
  } else {
    html += inputCard;
    html += renderMaterialSummary();
  }
  return html;
}

function renderProjectTab() {
  const st = current.stages.project;
  let html = '';
  const r = st.result;
  if (r) {
    let extra = '';
    if (r.consistencyWithResume) {
      const c = r.consistencyWithResume;
      extra += '<div class="section-label">与简历交叉验证</div><div style="margin-bottom:6px">' + tierTag(c.status) + '</div>' +
        '<ul class="flag-list">' + (c.details || []).map(d => '<li>' + esc(d) + '</li>').join('') + '</ul>';
    }
    extra += flagList(r.needsManualCheck, 'concern', '☐', '待人工核验');
    extra += qList(r.interviewQuestions, '项目相关面试追问');
    html += resultShell(r, extra, '项目评估结果');
  }
  return html;
}

function renderInterviewTab() {
  const st = current.stages.interview;
  let html = '<div class="card"><h3>面试前：生成个性化提纲</h3>' +
    '<div class="hint">基于简历和项目评估中的疑点，生成针对该候选人的面试问题清单（含逐层追问链），而非千人一面的套题。</div>' +
    '<div class="btn-row"><button id="outlineBtn" class="btn btn-secondary" onclick="runOutline()"><span class="spinner" style="display:none"></span>生成面试提纲</button></div>';
  if (st.outline && st.outline.sections) {
    html += st.outline.sections.map(sec =>
      '<div class="section-label">' + esc(sec.topic) + '</div><ol class="q-list">' +
      (sec.questions || []).map(q => '<li>' + esc(q.q) + '<span class="purpose">考察目的：' + esc(q.purpose) + '</span></li>').join('') + '</ol>'
    ).join('');
  }
  html += '</div>';

  html += '<div class="card"><h3>面试后：转写分析</h3>' +
    '<div class="hint">粘贴腾讯会议导出的转写文本。评估：逻辑结构 / 追问下的表现 / 目标感具体度 / 沟通表达，并与简历、项目交叉验证一致性。</div>' +
    '<textarea id="ivInput" placeholder="在此粘贴面试转写全文…" onblur="persistInputs()">' + esc(st.input) + '</textarea>' +
    '<div class="btn-row"><button id="ivBtn" class="btn btn-primary" onclick="runInterview()"><span class="spinner" style="display:none"></span>分析面试记录</button>' +
    (st.at ? '<span style="font-size:12px;color:var(--text-400)">上次评估：' + new Date(st.at).toLocaleString('zh-CN') + (st.engine ? ' · ' + esc(st.engine) : '') + '</span>' : '') +
    '</div><div class="error-box" id="ivErr" style="display:none"></div></div>';

  const r = st.result;
  if (r) {
    let extra = '';
    extra += trialRecommendationBlock(r.trialRecommendation);
    if (r.consistency) {
      extra += '<div class="section-label">跨阶段一致性</div><div style="margin-bottom:6px">' + tierTag(r.consistency.status) + '</div>' +
        '<ul class="flag-list">' + (r.consistency.issues || []).map(i => '<li class="concern">' + esc(i) + '</li>').join('') + '</ul>';
    }
    if (r.honestySignals) {
      extra += flagList(r.honestySignals.positive, 'pos', '＋', '诚信正面信号');
      extra += flagList(r.honestySignals.negative, 'neg', '－', '诚信负面信号');
    }
    html += resultShell(r, extra);
  }
  return html;
}

function renderTrialTab() {
  const st = current.stages.trial;
  const wc = countChineseWords(st.input || '');
  const trialFiles = st.fileMeta || [];
  let trialFileArea = '<div class="upload-zone" onclick="document.getElementById(\'trialFile\').click()">' +
    '<div style="font-size:14px;color:var(--text-100);font-weight:500">上传试稿文件</div>' +
    '<div style="font-size:12.5px;color:var(--text-400)">支持 DOC / DOCX / PDF / TXT / Markdown。飞书文档请先导出为 PDF 或 DOCX；私有飞书链接无法直接读取登录态。</div>' +
    '<input type="file" id="trialFile" accept=".doc,.docx,.pdf,.txt,.md,.markdown,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,text/plain,text/markdown,application/pdf" multiple style="display:none" onchange="onTrialFile(this)"></div>';
  if (trialFiles.length) {
    trialFileArea += '<div style="font-size:12.5px;color:var(--success);margin-top:8px">✓ 已导入：' +
      esc(trialFiles.map(f => f.name).join('、')) + '</div>';
  }
  let html = '<div class="card"><h3>试稿评审</h3>' +
    '<div class="hint">粘贴或上传试稿全文。评估维度：选题与读者意识 / 结构与逻辑 / 活人感与可读性 / 实战深度与有用性 / AI直出程度 / 事实错误风险。</div>' +
    '<div class="section-label">试稿正文</div>' +
    trialFileArea +
    '<textarea id="trialInput" style="margin-top:10px" placeholder="在此粘贴试稿全文…" onblur="persistInputs()" oninput="document.getElementById(\'wcLive\').innerHTML=wcHtml(countChineseWords(this.value))">' + esc(st.input) + '</textarea>' +
    '<div class="btn-row"><button id="trialBtn" class="btn btn-primary" onclick="runTrial()"><span class="spinner" style="display:none"></span>评审试稿</button>' +
    '<span class="wc-display" id="wcLive">' + wcHtml(wc) + '</span>' +
    (st.at ? '<span style="font-size:12px;color:var(--text-400)">上次评估：' + new Date(st.at).toLocaleString('zh-CN') + (st.engine ? ' · ' + esc(st.engine) : '') + '</span>' : '') +
    '</div><div class="error-box" id="trialErr" style="display:none"></div></div>';

  const r = st.result;
  if (r) {
    let extra = '';
    if (r.hardRequirements) {
      extra += '<div class="section-label">硬性要求核验</div>' + r.hardRequirements.map(h => {
        const cls = h.pass === true ? 'pass' : (h.pass === false ? 'fail' : 'unk');
        const mark = h.pass === true ? '✓' : (h.pass === false ? '✕' : '?');
        return '<div class="hard-req"><span class="hr-mark ' + cls + '">' + mark + '</span><span><b>' + esc(h.item) + '</b>　' + esc(h.notes) + '</span></div>';
      }).join('');
    }
    if (r.aiGeneratedAssessment) {
      const a = r.aiGeneratedAssessment;
      const cls = a.level === '低' ? 'tag-good' : (a.level === '中' ? 'tag-mid' : 'tag-bad');
      extra += '<div class="section-label">AI直出程度评估</div>' +
        '<div style="margin-bottom:6px"><span class="tag ' + cls + '">AI直出可能性：' + esc(a.level) + '</span></div>' +
        '<ul class="flag-list">' + (a.signals || []).map(sg => '<li>' + esc(sg) + '</li>').join('') + '</ul>' +
        (a.note ? '<div style="font-size:13px;color:var(--text-400);margin-top:4px">' + esc(a.note) + '</div>' : '');
    }
    extra += flagList(r.factualErrorRisks, 'concern', '⚠', '事实性错误风险');
    html += resultShell(r, extra);
  }
  return html;
}

function wcHtml(wc) {
  const ok = wc >= 2000;
  const best = wc >= 2000 && wc <= 2500;
  return '当前字数（去空白）：<b>' + wc + '</b> <span class="' + (ok ? 'ok' : 'no') + '">' +
    (ok ? (best ? '✓ 在最佳区间 2000–2500' : '✓ 达标（略超最佳区间2500）') : '✕ 未达 2000 字硬性要求') + '</span>';
}

function renderFinalReportSummary() {
  const r = current.stages.final && current.stages.final.result;
  if (!r || !r.recommendation) return '';
  let html = '<div class="card"><div class="result-header"><h4>最终建议摘要</h4>' +
    tierTag(r.recommendation.decision) + '</div>' +
    '<div class="result-summary">' + esc(r.recommendation.rationale || '') + '</div>';
  html += flagList(r.strengths, 'pos', '＋', '核心优势');
  html += flagList(r.risks, 'neg', '－', '主要风险');
  html += '</div>';
  return html;
}

function renderFinalTab() {
  const st = current.stages.final;
  const done = ['resume','project','interview','trial'].filter(k => current.stages[k].result).length;
  let staleWarn = '';
  if (st.result && st.at) {
    const later = ['resume','project','interview','trial'].some(k => {
      const a = current.stages[k].at;
      return a && new Date(a) > new Date(st.at);
    });
    if (later) staleWarn = '<div class="stale-note">⚠ 综合报告生成后，有阶段评估已更新，建议重新生成。</div>';
  }
  let html = '<div class="card"><h3>综合评估报告</h3>' +
    '<div class="hint">汇总四阶段证据链，输出核心能力总评、守信真诚跨阶段验证、不一致点清单和录用建议。已完成阶段：' + done + '/4（至少需2个）。</div>' +
    '<div class="btn-row"><button id="finalBtn" class="btn btn-primary" onclick="runFinal()"><span class="spinner" style="display:none"></span>' + (st.result ? '重新生成' : '生成综合报告') + '</button>' +
    (st.at ? '<span style="font-size:12px;color:var(--text-400)">生成于：' + new Date(st.at).toLocaleString('zh-CN') + (st.engine ? ' · ' + esc(st.engine) : '') + '</span>' : '') +
    '</div>' + staleWarn + '<div class="error-box" id="finalErr" style="display:none"></div></div>';

  const r = st.result;
  if (r) {
    let body = '<div class="card">';
    if (r.recommendation) {
      body += '<div class="result-header"><h4>最终建议</h4>' + tierTag(r.recommendation.decision) + '</div>' +
        '<div class="result-summary">' + esc(r.recommendation.rationale) + '</div>';
    }
    if (r.scoreSummary) {
      body += '<div class="section-label">核心能力总评</div>' + dimRows(r.scoreSummary.map(x => ({ name: x.dimension, score: x.score, evidence: x.basis ? [x.basis] : [] })));
    }
    if (r.integrityAssessment) {
      const ia = r.integrityAssessment;
      const cls = ia.level === '高' ? 'tag-good' : (ia.level === '中' ? 'tag-mid' : 'tag-bad');
      body += '<div class="section-label">守信与真诚（跨阶段证据链）</div>' +
        '<div style="margin-bottom:6px"><span class="tag ' + cls + '">诚信评估：' + esc(ia.level) + '</span></div>' +
        '<ul class="flag-list">' + (ia.evidenceChain || []).map(e => '<li>' + esc(e) + '</li>').join('') + '</ul>';
    }
    body += flagList(r.inconsistencies, 'concern', '⚠', '跨阶段不一致点');
    body += flagList(r.strengths, 'pos', '＋', '核心优势');
    body += flagList(r.risks, 'neg', '－', '主要风险');
    if (r.recommendation && r.recommendation.onboardingSuggestions && r.recommendation.onboardingSuggestions.length) {
      body += flagList(r.recommendation.onboardingSuggestions, '', '→', '入职培养建议');
    }
    body += '</div>';
    html += body;
  }
  return html;
}

init();
</script>
</body>
</html>
